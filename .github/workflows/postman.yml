name: Postman CI
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
jobs:
  postman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Postman Collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          api-key: ${{ secrets.POSTMAN_API_KEY }}
          command: collection run 52238111-652f7fbd-5f9a-465e-bd25-7cdbde0bbc04 -e 52274286-9c2a794f-dc81-4495-af53-ac075afdf0c4 --workspace-id 3ffc42a8-e401-4f51-a7e5-a3740c7295ec --report-events --verbose
